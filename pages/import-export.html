<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>匯入/匯出 - 書籤檢查小幫手</title>
  <link rel="stylesheet" href="../css/common.css">
  <style>
    .io-container { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-xl); }
    .io-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: var(--space-xl); display: flex; flex-direction: column; gap: var(--space-lg); }
    .io-card h3 { font-size: 1.1rem; font-weight: 700; display: flex; align-items: center; gap: var(--space-sm); }
    
    .drop-zone { border: 2px dashed var(--border); border-radius: var(--radius-lg); padding: var(--space-xl); text-align: center; cursor: pointer; transition: all var(--transition-base); background: rgba(255,255,255,0.02); }
    .drop-zone:hover, .drop-zone.dragover { border-color: var(--primary); background: rgba(108,99,255,0.05); }
    .drop-zone-icon { font-size: 2.5rem; margin-bottom: var(--space-md); opacity: 0.5; }
    
    .preview-section { margin-top: var(--space-lg); padding: var(--space-md); background: rgba(0,0,0,0.2); border-radius: var(--radius-md); border: 1px solid var(--border); }
    .preview-list { max-height: 200px; overflow-y: auto; margin-top: var(--space-sm); border-top: 1px solid var(--border); padding-top: var(--space-sm); }
    .preview-item { padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    
    .export-option { display: flex; align-items: center; gap: var(--space-md); padding: var(--space-md); background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: var(--radius-lg); transition: all var(--transition-base); }
    .export-option:hover { border-color: var(--primary); background: rgba(108,99,255,0.05); }
  </style>
</head>
<body>
<div class="page-layout">
  <nav class="sidebar" id="sidebar"></nav>

  <main class="main-content">
    <div class="page-header">
      <div>
        <h2 class="page-title">📦 匯入 / 匯出</h2>
        <p class="page-subtitle">備份書籤或從其他來源匯入</p>
      </div>
    </div>

    <div class="io-container">
      <!-- 匯入 -->
      <div class="io-card">
        <h3>📥 匯入書籤</h3>
        <p class="text-secondary" style="font-size:0.875rem">支援 JSON 或 Netscape HTML 格式（由 Chrome, Edge, Firefox 導出的檔案）。</p>
        
        <div class="drop-zone" id="drop-zone">
          <div class="drop-zone-icon">📄</div>
          <div>點擊或拖放檔案至此</div>
          <div style="font-size:0.75rem;color:var(--text-muted);margin-top:4px">支援 .json, .html, .htm</div>
          <input type="file" id="file-input" style="display:none" accept=".json,.html,.htm">
        </div>

        <div id="import-status" style="font-size:0.8rem;text-align:center;color:var(--text-muted)">準備就緒</div>

        <div class="preview-section" id="preview-section" style="display:none">
          <div style="font-weight:600;font-size:0.9rem;margin-bottom:8px">內容預覽</div>
          <div style="display:flex;gap:var(--space-md);font-size:0.8rem;color:var(--primary-light)">
            <span>書籤: <strong id="p-count">0</strong></span>
            <span>資料夾: <strong id="p-folders">0</strong></span>
            <span>格式: <strong id="p-format">-</strong></span>
          </div>
          <div class="preview-list" id="preview-list"></div>
          
          <div style="margin-top:var(--space-md)">
            <label style="font-size:0.8rem;display:block;margin-bottom:4px">重複處理：</label>
            <select class="input" id="import-dup-action" style="margin-bottom:12px">
              <option value="skip">跳過重複 (推薦)</option>
              <option value="overwrite">全部匯入 (可能產生重複)</option>
            </select>
            <div style="display:flex;gap:var(--space-sm)">
              <button class="btn btn-primary" style="flex:1" id="btn-import-confirm">開始匯入</button>
              <button class="btn btn-ghost" id="btn-import-cancel">取消</button>
            </div>
          </div>
        </div>
      </div>

      <!-- 匯出 -->
      <div class="io-card">
        <h3>📤 匯出備份</h3>
        <p class="text-secondary" style="font-size:0.875rem">定期備份您的書籤以防意外遺失。</p>
        
        <div class="export-option" id="btn-export-json" style="cursor:pointer">
          <div style="font-size:1.5rem">📄</div>
          <div style="flex:1">
            <div style="font-weight:600">匯出為 JSON</div>
            <div style="font-size:0.72rem;color:var(--text-muted)">包含所有元數據，最完整的備份格式。</div>
          </div>
          <span style="font-size:1.2rem;color:var(--text-muted)">›</span>
        </div>

        <div class="export-option" id="btn-export-html" style="cursor:pointer">
          <div style="font-size:1.5rem">🌐</div>
          <div style="flex:1">
            <div style="font-weight:600">匯出為 HTML</div>
            <div style="font-size:0.72rem;color:var(--text-muted)">標準書籤格式，可直接匯入任何瀏覽器。</div>
          </div>
          <span style="font-size:1.2rem;color:var(--text-muted)">›</span>
        </div>

        <div style="margin-top:auto;padding:var(--space-md);background:rgba(108,99,255,0.06);border-radius:var(--radius-md);font-size:0.8rem;color:var(--text-secondary)">
          💡 <strong>提示:</strong> 匯出的 HTML 檔案與 Chrome 內建的書籤管理員完全相容。
        </div>
      </div>
    </div>
  </main>
</div>

<script src="../js/bookmark-utils.js"></script>
<script src="../js/ui-utils.js"></script>
<script src="../js/import-export.js"></script>
<script src="import-export.js"></script>
</body>
</html>
