<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>失效連結 - 書籤檢查小幫手</title>
  <link rel="stylesheet" href="../css/common.css">
  <style>
    .check-config {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
      margin-bottom: var(--space-lg);
    }

    .config-grid {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-md);
      margin-bottom: var(--space-md);
    }

    .config-item label {
      display: block;
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .progress-section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
      margin-bottom: var(--space-lg);
      display: none;
    }

    .progress-section.visible { display: block; }

    .progress-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-sm);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: var(--space-sm);
      margin-bottom: var(--space-md);
    }

    .mini-stat {
      text-align: center;
      padding: var(--space-sm);
      background: var(--bg-card);
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all var(--transition-fast);
      user-select: none;
    }
    .mini-stat:hover {
      border-color: var(--primary);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(108,99,255,0.1);
    }
    /* 當前選中狀態 */
    .mini-stat.active {
      border-color: var(--primary);
      background: rgba(108,99,255,0.06);
      box-shadow: inset 0 0 0 1px var(--primary);
    }

    .mini-stat .val { font-size: 1.4rem; font-weight: 700; transition: transform 0.2s; }
    .mini-stat .lbl { font-size: 0.7rem; color: var(--text-muted); margin-top: 2px; }

    .filter-tabs { display: flex; gap: 4px; margin-bottom: var(--space-md); flex-wrap: wrap; }
    .filter-tab {
      padding: 5px 14px;
      border-radius: var(--radius-full);
      font-size: 0.8rem;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      transition: all var(--transition-fast);
      font-family: var(--font-sans);
    }
    .filter-tab:hover { background: var(--bg-card); color: var(--text-primary); }
    .filter-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    .link-item {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      padding: 12px var(--space-md);
      border-bottom: 1px solid var(--border);
      transition: background var(--transition-fast);
    }
    .link-item:last-child { border-bottom: none; }
    .link-item:hover { background: rgba(255,255,255,0.02); }

    .status-chip {
      padding: 3px 10px;
      border-radius: var(--radius-full);
      font-size: 0.75rem;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
      min-width: 80px;
      text-align: center;
    }
    .chip-ok { background: rgba(107,203,119,0.2); color: var(--success); }
    .chip-error { background: rgba(255,107,107,0.2); color: var(--danger-light); }
    .chip-redirect { background: rgba(255,217,61,0.2); color: var(--warning); }
    .chip-timeout { background: rgba(96,96,160,0.2); color: var(--text-muted); }

    .results-list {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .results-toolbar {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      padding: var(--space-md);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
    }
    .search-wrap input { padding-left: 30px; }
    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 0.85rem;
      pointer-events: none;
    }

    /* 🎨 自定義多選下拉選單樣式 */
    .custom-multiselect {
      position: relative;
      width: 100%;
      user-select: none;
    }
    .multiselect-trigger {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      height: 38px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--bg-card);
      color: var(--text);
      cursor: pointer;
      font-size: 0.9rem;
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
    }
    .multiselect-trigger:hover {
      border-color: var(--primary-light);
    }
    .multiselect-trigger.active {
      border-color: var(--primary-light);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }
    .multiselect-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      z-index: 1000;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg);
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 320px;
    }
    .dropdown-list {
      overflow-y: auto;
      max-height: 180px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .dropdown-item {
      display: flex;
      align-items: center;
      padding: 4px 8px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background var(--transition-fast);
    }
    .dropdown-item:hover {
      background: rgba(255,255,255,0.03);
    }
    .dropdown-item label {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      cursor: pointer;
      font-size: 0.85rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    /* 🎨 客製單選下拉選單樣式 */
    .select-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 8px;
      border-radius: var(--radius-xs);
      cursor: pointer;
      font-size: 0.8rem;
      transition: background var(--transition-fast);
      color: var(--text-primary);
    }
    .select-item:hover {
      background: var(--bg-card-hover);
    }
    .select-item.selected {
      background: var(--bg-card-hover);
      font-weight: 500;
    }
  </style>
</head>
<body>
<div class="page-layout">
  <!-- 側邊欄 -->
  <nav class="sidebar" id="sidebar"></nav>

  <!-- 主內容 -->
  <main class="main-content">
    <div class="page-header">
      <div>
        <h2 class="page-title">💀 失效連結檢查</h2>
        <p class="page-subtitle">檢測書籤中無法訪問的連結</p>
      </div>
    </div>

    <!-- 設定區 -->
    <div class="check-config">
      <div class="config-grid">
        <div class="config-item" style="flex: 1; min-width: 240px; max-width: 400px; position: relative;">
          <label>資料夾篩選</label>
          <div class="custom-multiselect" id="folder-filter-container">
            <div class="multiselect-trigger" id="folder-filter-trigger">
              <span class="trigger-text" id="folder-trigger-text">全部書籤</span>
              <span class="trigger-arrow">▼</span>
            </div>
            <div class="multiselect-dropdown" id="folder-filter-dropdown" style="display: none;">
              <div class="dropdown-search">
                <input type="text" class="input" id="folder-search" placeholder="搜尋資料夾..." style="width: 100%; height: 32px; font-size: 0.85rem; padding: 0 8px; border-radius: var(--radius-sm);">
              </div>
              <div class="dropdown-actions" style="display: flex; gap: 8px; border-bottom: 1px solid var(--border); padding-bottom: 6px; margin-bottom: 4px;">
                <button class="btn btn-ghost btn-xs" id="btn-folder-select-all" style="font-size: 0.75rem; padding: 2px 6px;">全選</button>
                <button class="btn btn-ghost btn-xs" id="btn-folder-clear-all" style="font-size: 0.75rem; padding: 2px 6px;">清除</button>
              </div>
              <div class="dropdown-list" id="folder-filter-list">
                <!-- 動態填充 Checkbox 項目 -->
              </div>
            </div>
          </div>
        </div>
        <div class="config-item" style="width: 100px; flex-shrink: 0;">
          <label>並發數量</label>
          <input type="number" class="input" id="concurrent" value="5" min="1" max="20">
        </div>
        <div class="config-item" style="width: 130px; flex-shrink: 0;">
          <label>超時時間（秒）</label>
          <input type="number" class="input" id="timeout" value="10" min="3" max="60">
        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <button class="btn btn-primary" id="btn-start">⚡ 開始檢查</button>
        <button class="btn btn-ghost" id="btn-stop" disabled>⏹ 停止</button>
        <span id="check-status" style="color:var(--text-muted);font-size:0.875rem"></span>
      </div>
    </div>

    <!-- 進度區 -->
    <div class="progress-section" id="progress-section">
      <div class="progress-info">
        <span style="font-weight:600">🔍 檢查進度</span>
        <span id="progress-text" style="color:var(--text-secondary);font-size:0.85rem">0 / 0</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <div style="color:var(--text-muted);font-size:0.78rem;margin-top:6px" id="checking-url">等待中...</div>
    </div>

    <!-- 整合後的統計過濾按鈕面板 -->
    <div class="stats-grid" id="stats-grid" style="display:none">
      <div class="mini-stat active" data-filter="all">
        <div class="val" id="s-total" style="color:var(--text-primary)">0</div>
        <div class="lbl">📊 總計</div>
      </div>
      <div class="mini-stat" data-filter="ok">
        <div class="val" id="s-ok" style="color:var(--success)">0</div>
        <div class="lbl">✅ 正常</div>
      </div>
      <div class="mini-stat" data-filter="dead">
        <div class="val" id="s-dead" style="color:var(--danger)">0</div>
        <div class="lbl">❌ 失效</div>
      </div>
      <div class="mini-stat" data-filter="redirect">
        <div class="val" id="s-redirect" style="color:var(--warning)">0</div>
        <div class="lbl">↪️ 重新導向</div>
      </div>
      <div class="mini-stat" data-filter="timeout">
        <div class="val" id="s-timeout" style="color:var(--text-muted)">0</div>
        <div class="lbl">⏱️ 逾時</div>
      </div>
    </div>

    <!-- 結果清單 -->
    <div class="results-list" id="results-list" style="display:none">
      <div class="results-toolbar">
        <label class="checkbox-custom">
          <input type="checkbox" id="select-all">
          <span>全選</span>
        </label>
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" class="input" id="search-input" placeholder="搜尋書籤名稱或 URL...">
        </div>
        <!-- 客製化單選下拉選單以支援紅色數量字體 -->
        <div class="custom-select" id="select-by-folder-container" style="position: relative; max-width: 180px; width: 100%; user-select: none;">
          <div class="select-trigger" id="select-by-folder-trigger" style="display: flex; align-items: center; justify-content: space-between; padding: 0 10px; height: 30px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg-surface); color: var(--text-primary); cursor: pointer; font-size: 0.8rem; transition: border-color var(--transition-fast);">
            <span class="trigger-text" id="select-by-folder-text">📂 按資料夾選取...</span>
            <span class="trigger-arrow" style="font-size: 0.6rem; color: var(--text-muted);">▼</span>
          </div>
          <div class="select-dropdown" id="select-by-folder-dropdown" style="display: none; position: absolute; top: calc(100% + 4px); left: auto; right: 0; min-width: 100%; width: max-content; max-width: 480px; z-index: 1000; background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-sm); box-shadow: var(--shadow-md); padding: 4px; flex-direction: column; gap: 4px; max-height: 380px; overflow-y: auto;">
            <!-- 動態渲染選項 -->
          </div>
        </div>
        <span id="sel-count" style="color:var(--text-muted);font-size:0.8rem"></span>
        <button class="btn btn-secondary btn-sm" id="btn-recheck-selected" disabled style="display:flex;align-items:center;gap:4px">🔄 重新檢查選取</button>
        <button class="btn btn-secondary btn-sm" id="btn-recheck-all" style="display:flex;align-items:center;gap:4px;border:1px solid var(--primary-light);color:var(--primary-light)">🔄 重新檢查全部</button>
        <button class="btn btn-danger btn-sm" id="btn-del-selected" disabled>🗑️ 刪除選取</button>
      </div>
      <div id="list-body"></div>
    </div>

    <div class="empty-state" id="empty-state">
      <div class="empty-icon">⚡</div>
      <div class="empty-title">準備好了！</div>
      <div class="empty-desc">點擊「開始檢查」掃描所有書籤的連結狀態</div>
    </div>
  </main>
</div>

<script src="../js/bookmark-utils.js"></script>
<script src="../js/trash-manager.js"></script>
<script src="../js/ui-utils.js"></script>
<script src="../js/link-checker.js"></script>
<script src="deadlinks.js"></script>
</body>
</html>
