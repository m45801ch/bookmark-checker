<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>設定 - 書籤檢查小幫手</title>
  <link rel="stylesheet" href="../css/common.css">
  <style>
    .settings-section { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: var(--space-xl); margin-bottom: var(--space-lg); }
    .section-title { font-size: 1rem; font-weight: 700; margin-bottom: var(--space-lg); display: flex; align-items: center; gap: var(--space-sm); padding-bottom: var(--space-md); border-bottom: 1px solid var(--border); }
    .setting-row { display: flex; align-items: flex-start; gap: var(--space-lg); margin-bottom: var(--space-lg); }
    .setting-label-col { flex: 1; min-width: 0; }
    .setting-label { font-weight: 500; margin-bottom: 2px; }
    .setting-desc { font-size: 0.8rem; color: var(--text-secondary); line-height: 1.5; }
    .setting-control { flex-shrink: 0; width: 200px; }
    
    .toggle-switch { position: relative; width: 44px; height: 24px; margin-top: 2px; display: block; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; inset: 0; background: rgba(255,255,255,0.1); border-radius: 24px; cursor: pointer; transition: background var(--transition-base); border: 1px solid var(--border); }
    .toggle-slider::before { content: ''; position: absolute; width: 18px; height: 18px; background: var(--text-muted); border-radius: 50%; left: 2px; top: 2px; transition: transform var(--transition-base); }
    .toggle-switch input:checked + .toggle-slider { background: rgba(108,99,255,0.3); border-color: var(--primary); }
    .toggle-switch input:checked + .toggle-slider::before { transform: translateX(20px); background: var(--primary); }
    
    .save-bar { position: sticky; bottom: 0; background: var(--bg-surface); border-top: 1px solid var(--border); padding: var(--space-md) var(--space-xl); display: flex; align-items: center; gap: var(--space-md); margin: 0 calc(var(--space-xl) * -1) calc(var(--space-xl) * -1); }
    .range-wrap { display: flex; align-items: center; gap: 8px; }
    .range-wrap input[type=range] { flex: 1; accent-color: var(--primary); }
    .range-val { min-width: 30px; text-align: right; font-size: 0.875rem; color: var(--primary-light); font-weight: 600; }
  </style>
</head>
<body>
<div class="page-layout">
  <nav class="sidebar" id="sidebar"></nav>

  <main class="main-content">
    <div class="page-header">
      <div>
        <h2 class="page-title">⚙️ 設定</h2>
        <p class="page-subtitle">個性化您的書籤檢查體驗</p>
      </div>
    </div>

    <div class="settings-section">
      <div class="section-title">⚡ 失效連結檢查</div>
      <div class="setting-row">
        <div class="setting-label-col">
          <div class="setting-label">並發數量</div>
          <div class="setting-desc">同時進行多少個連結請求。建議 3-10。</div>
        </div>
        <div class="setting-control">
          <div class="range-wrap">
            <input type="range" id="s-concurrent" min="1" max="20" value="5">
            <span class="range-val" id="v-concurrent">5</span>
          </div>
        </div>
      </div>
      <div class="setting-row">
        <div class="setting-label-col">
          <div class="setting-label">請求超時（秒）</div>
          <div class="setting-desc">等待伺服器回應的最長時間。</div>
        </div>
        <div class="setting-control">
          <div class="range-wrap">
            <input type="range" id="s-timeout" min="3" max="60" value="10">
            <span class="range-val" id="v-timeout">10s</span>
          </div>
        </div>
      </div>
    </div>

    <div class="settings-section">
      <div class="section-title">🔍 重複書籤檢測</div>
      <div class="setting-row">
        <div class="setting-label-col">
          <div class="setting-label">預設比對模式</div>
          <div class="setting-desc">選擇掃描重複時的預設精確度。</div>
        </div>
        <div class="setting-control">
          <select class="input" id="s-dup-mode">
            <option value="url">完整 URL 比對</option>
            <option value="domain">網域比對</option>
            <option value="rootdomain">根網域比對</option>
          </select>
        </div>
      </div>
    </div>

    <div class="settings-section">
      <div class="section-title">🗑️ 回收站</div>
      <div class="setting-row">
        <div class="setting-label-col">
          <div class="setting-label">自動清理天數</div>
          <div class="setting-desc">超過此天數的項目將自動永久刪除。</div>
        </div>
        <div class="setting-control">
          <div class="range-wrap">
            <input type="range" id="s-trash-days" min="0" max="365" value="30">
            <span class="range-val" id="v-trash-days">30天</span>
          </div>
        </div>
      </div>
    </div>

    <div class="settings-section">
      <div class="section-title">🎨 介面</div>
      <div class="setting-row">
        <div class="setting-label-col">
          <div class="setting-label">顯示網站圖示</div>
          <div class="setting-desc">在清單中顯示 Favicon。</div>
        </div>
        <div class="setting-control">
          <label class="toggle-switch">
            <input type="checkbox" id="s-favicons" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
    </div>

    <div class="settings-section" style="text-align:center">
      <div style="font-size:2rem;margin-bottom:12px">🔖</div>
      <div style="font-weight:700;margin-bottom:12px">書籤檢查小幫手 v1.0.0</div>
      <div style="display:flex;gap:var(--space-sm);justify-content:center">
        <button class="btn btn-ghost btn-sm" id="btn-clear-storage">🧹 清除所有儲存資料</button>
        <button class="btn btn-ghost btn-sm" id="btn-export-settings">📋 匯出設定</button>
      </div>
    </div>

    <div class="save-bar">
      <span id="save-status" style="color:var(--text-muted);font-size:0.875rem"></span>
      <button class="btn btn-ghost btn-sm" id="btn-reset" style="margin-left:auto">重設預設值</button>
      <button class="btn btn-primary" id="btn-save">💾 儲存設定</button>
    </div>
  </main>
</div>

<script src="../js/bookmark-utils.js"></script>
<script src="../js/ui-utils.js"></script>
<script src="settings.js"></script>
</body>
</html>
